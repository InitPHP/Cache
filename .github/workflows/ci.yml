name: CI

on:
  push:
    branches: [main, "*.x"]
  pull_request:
    branches: [main, "*.x"]

jobs:
  validate:
    name: composer validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer:v2
      - run: composer validate --strict

  cs:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Check coding standards
        run: composer cs-check

  stan:
    name: PHPStan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run PHPStan
        run: composer stan

  tests:
    name: PHPUnit (PHP ${{ matrix.php }}, ${{ matrix.deps }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        php: ["8.0", "8.1", "8.2", "8.3", "8.4"]
        deps: ["highest"]
        include:
          - php: "8.0"
            deps: "lowest"
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ matrix.deps }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ matrix.php }}-${{ matrix.deps }}-

      - name: Install highest dependencies
        if: matrix.deps == 'highest'
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Install lowest dependencies
        if: matrix.deps == 'lowest'
        run: composer update --prefer-dist --no-progress --no-interaction --prefer-lowest --prefer-stable

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  integration:
    name: Integration (Redis + Memcached)
    runs-on: ubuntu-latest
    needs: validate
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      memcached:
        image: memcached:1.6
        ports:
          - 11211:11211
    env:
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      MEMCACHED_HOST: 127.0.0.1
      MEMCACHED_PORT: 11211
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: redis, memcached, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run integration tests
        run: vendor/bin/phpunit --group integration

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: tests
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      memcached:
        image: memcached:1.6
        ports:
          - 11211:11211
    env:
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      MEMCACHED_HOST: 127.0.0.1
      MEMCACHED_PORT: 11211
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: redis, memcached, pdo_sqlite
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run unit tests with coverage
        run: vendor/bin/phpunit --coverage-clover=coverage-unit.xml

      - name: Run integration tests with coverage
        run: vendor/bin/phpunit --group integration --coverage-clover=coverage-integration.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: |
            coverage-unit.xml
            coverage-integration.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-unit.xml,./coverage-integration.xml
          flags: phpunit
          fail_ci_if_error: false
